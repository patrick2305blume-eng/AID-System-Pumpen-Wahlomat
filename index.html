<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AID-System/Pumpen-Wahlomat</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
        }
        .container { max-width: 600px; width: 100%; }
        h1 { color: #5dade2; text-align: center; margin-bottom: 5px; font-size: 26px; }
        .sub-title { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        
        .question-card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border-left: 5px solid #3498db; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        .question-text { font-size: 16px; font-weight: 500; }
        
        .options { display: flex; gap: 10px; margin-top: 15px; }
        button { 
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2c2c2c; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.2s ease; 
        }
        button.active { background: #3498db; border-color: #5dade2; transform: scale(1.02); }
        
        #result-btn { 
            width: 100%; 
            padding: 20px; 
            background: #2ecc71; 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 25px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            color: #121212;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        #result-btn:active { transform: scale(0.98); }

        .result-header { margin-top: 40px; padding-bottom: 10px; border-bottom: 1px solid #333; width: 100%; }
        
        .result-item { 
            background: #1e1e1e; 
            margin-top: 15px; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            position: relative; 
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .percentage { font-size: 28px; font-weight: bold; color: #2ecc71; position: absolute; right: 20px; top: 20px; }
        .details { font-size: 14px; color: #aaa; margin-top: 10px; line-height: 1.6; }
        
        .loop-tag { 
            display: inline-block; 
            padding: 3px 10px; 
            border-radius: 6px; 
            font-size: 11px; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            font-weight: 800; 
        }
        .is-loop { background: #27ae60; color: white; }
        .no-loop { background: #e67e22; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>AID-System/Pumpen-Wahlomat</h1>
    <p class="sub-title">Interaktiver Vergleich für deine Insulinpumpen-Therapie</p>

    <div id="quiz"></div>

    <button id="result-btn" onclick="calculateScore()">Ergebnisse berechnen</button>
    <div id="results"></div>
</div>

<script>
// Experten-Datenbank (Stand 2026)
const systems = [
    { name: "Omnipod 5", patch: true, loop: true, handy: false, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, cgm: "Dexcom G6, G7, Libre 3 Plus" },
    { name: "Ypsopump (CamAPS FX)", patch: false, loop: true, handy: true, wasser: true, schwanger: true, batterie: true, zielUnter100: true, vorbefuellt: true, leicht: true, cgm: "Dexcom G6, G7, Libre 3" },
    { name: "t:slim X2 (Control-IQ)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: false, cgm: "Dexcom G6, G7" },
    { name: "Medtronic 780G", patch: false, loop: true, handy: false, wasser: true, schwanger: true, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: false, cgm: "Guardian 4, Simplera" },
    { name: "Dana-i (DBLG1)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: true, cgm: "Dexcom G6" },
    { name: "Kaleido (DBLG1)", patch: true, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, cgm: "Dexcom G6" },
    { name: "Medtrum Nano (EasyLoop)", patch: true, loop: true, handy: true, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, cgm: "Nano CGM" },
    { name: "Dana-i (Basis)", patch: false, loop: false, handy: true, wasser: false, schwanger: false, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: true, cgm: "Keine (Manuell)" },
    { name: "Omnipod DASH", patch: true, loop: false, handy: false, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, cgm: "Keine (Manuell)" }
];

const questions = [
    { id: "loop", text: "Möchtest du ein AID-System (Automatischer Loop)?" },
    { id: "patch", text: "Bevorzugst du eine Patch-Pumpe (schlauchlos)?" },
    { id: "handy", text: "Steuerung über dein eigenes Smartphone (Bolus/Basal)?" },
    { id: "wasser", text: "Ist dir Wasserdichtigkeit sehr wichtig?" },
    { id: "schwanger", text: "Benötigst du eine Zulassung für Schwangerschaft?" },
    { id: "batterie", text: "Möchtest du Standard-Batterien (AAA) nutzen?" },
    { id: "zielUnter100", text: "Möchtest du Zielwerte unter 100 mg/dl einstellen?" },
    { id: "vorbefuellt", text: "Möchtest du vorbefüllte Reservoire (PumpCarts)?" },
    { id: "leicht", text: "Soll die Pumpe besonders leicht sein (< 100g)?" }
];

const userAnswers = {};
const quizContainer = document.getElementById('quiz');

// Quiz dynamisch erstellen
questions.forEach(q => {
    userAnswers[q.id] = null;
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `
        <div class="question-text">${q.text}</div>
        <div class="options">
            <button onclick="setAnswer('${q.id}', true, this)">Ja</button>
            <button onclick="setAnswer('${q.id}', false, this)">Nein</button>
            <button class="active" onclick="setAnswer('${q.id}', null, this)">Egal</button>
        </div>
    `;
    quizContainer.appendChild(div);
});

function setAnswer(id, val, btn) {
    userAnswers[id] = val;
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function calculateScore() {
    let results = systems.map(sys => {
        let matched = 0;
        let totalRelevant = 0;
        for (let key in userAnswers) {
            if (userAnswers[key] !== null) {
                totalRelevant++;
                if (sys[key] === userAnswers[key]) matched++;
            }
        }
        let percent = totalRelevant === 0 ? 0 : (matched / totalRelevant) * 100;
        return { ...sys, percent: Math.round(percent) };
    });

    results.sort((a, b) => b.percent - a.percent);
    
    const resDiv = document.getElementById('results');
    resDiv.innerHTML = '<div class="result-header"><h2>Deine Top-Systeme:</h2></div>';
    
    results.forEach(r => {
        resDiv.innerHTML += `
            <div class="result-item">
                <span class="percentage">${r.percent}%</span>
                <span class="loop-tag ${r.loop ? 'is-loop' : 'no-loop'}">${r.loop ? 'AID / Loop' : 'Insulinpumpe'}</span>
                <div style="font-size:20px; font-weight:bold; color:#5dade2; margin-top:5px;">${r.name}</div>
                <div class="details">
                    <strong>Bauart:</strong> ${r.patch ? 'Patch-System' : 'Schlauch-System'}<br>
                    <strong>Steuerung:</strong> ${r.handy ? 'Privates Smartphone' : 'Zusatzgerät (PDM/Mobil) / Pumpe'}<br>
                    <strong>Sensoren:</strong> ${r.cgm}
                </div>
            </div>
        `;
    });
    
    // Sanftes Scrollen zu den Ergebnissen
    resDiv.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
