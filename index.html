<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AID-System/Pumpen-Wahlomat DE 2026</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { max-width: 650px; width: 100%; }
        h1 { color: #5dade2; text-align: center; margin-bottom: 5px; font-size: 24px; }
        .sub-title { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        
        .question-card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .question-text { font-weight: bold; margin-bottom: 10px; display: block; }
        .options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        
        button, select { flex: 1; min-width: 90px; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        button.active { background: #3498db; border-color: #5dade2; }
        button.important-btn { border-color: #f1c40f; color: #f1c40f; }
        button.important-btn.active { background: #f1c40f; color: #121212; }
        
        select { background: #333; border-color: #5dade2; appearance: none; text-align: center; }
        #result-btn { width: 100%; padding: 20px; background: #2ecc71; font-size: 18px; font-weight: bold; margin-top: 25px; border: none; border-radius: 12px; cursor: pointer; color: #000; }

        /* DER FINALE LAYOUT-FIX: Kein Überlappen mehr möglich */
        .result-item { 
            background: #1e1e1e; margin-top: 15px; padding: 20px; 
            border-radius: 12px; border: 1px solid #333; 
            display: grid;
            grid-template-columns: 1fr 140px; /* Textspalte flexibel, Prozentspalte IMMER 140px */
            align-items: center;
            gap: 15px;
        }

        .result-content { min-width: 0; } /* Zwingt Text zum Umbruch innerhalb der Grid-Zelle */
        .system-name { font-size: 19px; font-weight: bold; color: #5dade2; margin: 0; word-wrap: break-word; }
        
        .percentage-box { 
            text-align: right; border-left: 1px solid #333; padding-left: 15px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        .percent-big { font-size: 28px; font-weight: bold; color: #2ecc71; line-height: 1; }
        .percent-label { font-size: 11px; margin-top: 4px; color: #2ecc71; }

        .details { font-size: 14px; color: #aaa; margin-top: 10px; line-height: 1.5; }
        .loop-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .is-loop { background: #27ae60; color: white; }
        .no-loop { background: #e67e22; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>AID-System/Pumpen-Wahlomat</h1>
    <p class="sub-title">Stand DE März 2026 | Vollständige Liste</p>

    <div id="quiz"></div>

    <div class="question-card" style="border-left-color: #f1c40f;">
        <span class="question-text">Frage 10: Welchen Sensor möchtest du nutzen?</span>
        <div class="options">
            <select id="sensor-choice">
                <option value="egal">Egal / Kein Wunsch</option>
                <option value="G6">Dexcom G6</option>
                <option value="G7">Dexcom G7</option>
                <option value="L3">FreeStyle Libre 3</option>
                <option value="L3P">FreeStyle Libre 3 Plus</option>
                <option value="G4">Guardian 4 (Medtronic)</option>
                <option value="SIM">Simplera Sync (Medtronic)</option>
                <option value="NANO">Medtrum Nano CGM</option>
            </select>
            <button id="sensor-important-btn" onclick="toggleSensorWeight()" style="flex: 0.3; min-width: 100px;">Wichtig!</button>
        </div>
    </div>

    <button id="result-btn" onclick="calculateScore()">Auswertung berechnen</button>
    <div id="results"></div>
</div>

<script>
let sensorIsImportant = false;

const systems = [
    { name: "Omnipod 5", patch: true, loop: true, handy: false, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["G6", "G7"], note: "Schlauchloses Patch-System" },
    { name: "Ypsopump (CamAPS FX)", patch: false, loop: true, handy: true, wasser: true, schwanger: true, batterie: true, zielUnter100: true, vorbefuellt: true, leicht: true, sensors: ["G6", "L3", "L3P"], note: "Handy-Loop mit Libre 3/3+ Support" },
    { name: "t:slim X2 (Control-IQ)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G6", "G7"], note: "Touch-Bedienung & Dexcom G7" },
    { name: "Medtronic 780G", patch: false, loop: true, handy: false, wasser: true, schwanger: true, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G4", "SIM"], note: "Integrierter Simplera Sync Sensor" },
    { name: "Dana-i (DBLG1)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["G6"], note: "Kombination mit DBLG1 Algorithmus" },
    { name: "Kaleido (DBLG1)", patch: true, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["G6"], note: "Hybrid-Patch-Pumpe" },
    { name: "Medtrum Nano (EasyLoop)", patch: true, loop: true, handy: true, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["NANO"], note: "Sehr kleiner Nano-Patch" },
    { name: "Dana-i (Basis)", patch: false, loop: false, handy: true, wasser: false, schwanger: false, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: [], note: "Standardpumpe (Kein AID)" },
    { name: "Omnipod DASH", patch: true, loop: false, handy: false, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: [], note: "Bewährtes Patch-System" }
];

const questions = [
    { id: "loop", text: "Möchtest du ein AID-System (Automatischer Loop)?" },
    { id: "patch", text: "Bevorzugst du eine Patch-Pumpe (schlauchlos)?" },
    { id: "handy", text: "Bolus-Steuerung über das Smartphone?" },
    { id: "wasser", text: "Wasserdichtigkeit der Pumpe wichtig?" },
    { id: "schwanger", text: "Zulassung für Schwangerschaft benötigt?" },
    { id: "batterie", text: "Betrieb mit AAA-Batterie bevorzugt?" },
    { id: "zielUnter100", text: "Zielwerte unter 100 mg/dl möglich?" },
    { id: "vorbefuellt", text: "Möchtest du vorbefüllte Reservoire nutzen?" },
    { id: "leicht", text: "Sehr geringes Gewicht (< 100g)?" }
];

const userAnswers = {};
const quizContainer = document.getElementById('quiz');

questions.forEach(q => {
    userAnswers[q.id] = { value: null, weight: 0 };
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `<span class="question-text">${q.text}</span><div class="options">
        <button onclick="setAnswer('${q.id}', true, this, 1)">Ja</button>
        <button class="important-btn" onclick="setAnswer('${q.id}', true, this, 3)">Wichtig!</button>
        <button onclick="setAnswer('${q.id}', false, this, 1)">Nein</button>
        <button class="active" onclick="setAnswer('${q.id}', null, this, 0)">Egal</button>
    </div>`;
    quizContainer.appendChild(div);
});

function setAnswer(id, val, btn, weight) {
    userAnswers[id] = { value: val, weight: weight };
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function toggleSensorWeight() {
    sensorIsImportant = !sensorIsImportant;
    document.getElementById('sensor-important-btn').classList.toggle('active');
    document.getElementById('sensor-important-btn').classList.toggle('important-btn');
}

function calculateScore() {
    const selectedSensor = document.getElementById('sensor-choice').value;
    let results = systems.map(sys => {
        let matchedPoints = 0, totalPoints = 0;
        for (let key in userAnswers) {
            const a = userAnswers[key];
            if (a.weight > 0) { 
                totalPoints += a.weight; 
                if (sys[key] === a.value) matchedPoints += a.weight; 
            }
        }
        if (selectedSensor !== "egal") {
            const weight = sensorIsImportant ? 3 : 1;
            totalPoints += weight;
            if (sys.sensors.includes(selectedSensor)) matchedPoints += weight;
        }
        let score = totalPoints === 0 ? 100 : Math.round((matchedPoints / totalPoints) * 100);
        return { ...sys, percent: score };
    });

    results.sort((a, b) => b.percent - a.percent);
    const resDiv = document.getElementById('results');
    resDiv.innerHTML = '<h2 style="margin-top:20px; border-top:1px solid #444; padding-top:15px;">Dein Ranking:</h2>';
    results.forEach(r => {
        resDiv.innerHTML += `
        <div class="result-item">
            <div class="result-content">
                <span class="loop-tag ${r.loop ? 'is-loop' : 'no-loop'}">${r.loop ? 'AID / Loop' : 'Standardpumpe'}</span>
                <p class="system-name">${r.name}</p>
                <div class="details">
                    <strong>Kompatible Sensoren:</strong> ${r.sensors.length > 0 ? r.sensors.join(", ") : "Keine Kopplung"}<br>
                    <strong>Zusammenfassung:</strong> ${r.note}
                </div>
            </div>
            <div class="percentage-box">
                <span class="percent-big">${r.percent}%</span>
                <span class="percent-label">Übereinstimmung</span>
            </div>
        </div>`;
    });
    resDiv.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
