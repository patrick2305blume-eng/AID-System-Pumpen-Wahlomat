<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AID-System Wahlomat 2026</title>
    <style>
        /* Verhindert das Abschneiden der Seite */
        html, body { height: auto; min-height: 100%; margin: 0; padding: 0; background: #121212; color: white; }
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        
        .container { max-width: 600px; width: 100%; padding-bottom: 100px; } /* Platz für Ergebnisse unten */
        h1 { color: #5dade2; text-align: center; font-size: 22px; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
        
        .question-card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .question-text { font-weight: bold; font-size: 15px; margin-bottom: 10px; display: block; }
        .options { display: flex; gap: 8px; flex-wrap: wrap; }
        
        button, select, input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; min-width: 80px; }
        button.active { background: #3498db; border-color: #5dade2; }
        input { cursor: text; text-align: center; outline: none; }
        input:focus { border-color: #5dade2; background: #333; }
        
        select { background: #333; border-color: #5dade2; appearance: none; text-align: center; }
        #result-btn { width: 100%; padding: 20px; background: #2ecc71; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; margin: 20px 0; cursor: pointer; color: black; }

        .result-item { background: #1e1e1e; margin-top: 15px; padding: 18px; border-radius: 12px; border: 1px solid #333; display: grid; grid-template-columns: 1fr 100px; align-items: center; gap: 15px; }
        .system-name { font-size: 18px; font-weight: bold; color: #5dade2; }
        .warning { color: #ff4d4d; font-weight: bold; font-size: 12px; display: block; margin-top: 5px; }
        .loop-tag { display: inline-block; padding: 3px 7px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #27ae60; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>AID-System Wahlomat</h1>
    <p class="sub-title">12 Kriterien Check (Inkl. Alter & Insulin)</p>

    <div class="question-card" style="border-left-color: #9b59b6;">
        <span class="question-text">1. Wie alt ist der Anwender?</span>
        <div class="options"><input type="number" id="user-age" placeholder="Jahre"></div>
    </div>

    <div class="question-card" style="border-left-color: #9b59b6;">
        <span class="question-text">2. Täglicher Insulinbedarf (Gesamt IE)?</span>
        <div class="options"><input type="number" id="user-tdd" placeholder="Einheiten"></div>
    </div>

    <div id="quiz"></div>

    <div class="question-card" style="border-left-color: #f1c40f;">
        <span class="question-text">12. Bevorzugter CGM-Sensor?</span>
        <div class="options">
            <select id="sensor-choice">
                <option value="egal">Egal</option>
                <option value="G6">Dexcom G6</option>
                <option value="G7">Dexcom G7</option>
                <option value="L3">Libre 3</option>
                <option value="L3P">Libre 3 Plus</option>
                <option value="G4">Guardian 4</option>
                <option value="SIM">Simplera Sync</option>
            </select>
        </div>
    </div>

    <button id="result-btn" onclick="calculateScore()">Ergebnis anzeigen</button>
    <div id="results"></div>
</div>

<script>
const systems = [
    { name: "Omnipod 5", patch: true, loop: true, handy: false, wasser: true, schwanger: false, batterie: false, ziel100: false, vorbefuellt: false, leicht: true, sensors: ["G6", "G7"], minAge: 2, minTDD: 5, maxTDD: 65 },
    { name: "Ypsopump (CamAPS)", patch: false, loop: true, handy: true, wasser: true, schwanger: true, batterie: true, ziel100: true, vorbefuellt: true, leicht: true, sensors: ["G6", "L3", "L3P"], minAge: 0, minTDD: 5, maxTDD: 54 },
    { name: "t:slim X2", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, ziel100: false, vorbefuellt: false, leicht: false, sensors: ["G6", "G7"], minAge: 6, minTDD: 10, maxTDD: 100 },
    { name: "Medtronic 780G", patch: false, loop: true, handy: false, wasser: true, schwanger: true, batterie: true, ziel100: false, vorbefuellt: false, leicht: false, sensors: ["G4", "SIM"], minAge: 7, minTDD: 8, maxTDD: 100 },
    { name: "Dana-i (DBLG1)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: true, ziel100: false, vorbefuellt: false, leicht: true, sensors: ["G6"], minAge: 18, minTDD: 8, maxTDD: 90 }
];

const questions = [
    { id: "loop", text: "3. Möchtest du einen automatischen Loop (AID)?" },
    { id: "patch", text: "4. Soll die Pumpe schlauchlos (Patch) sein?" },
    { id: "handy", text: "5. Bolus-Steuerung über das Smartphone?" },
    { id: "wasser", text: "6. Wasserdichtigkeit wichtig?" },
    { id: "schwanger", text: "7. Zulassung für Schwangerschaft?" },
    { id: "batterie", text: "8. Betrieb mit AAA-Batterie?" },
    { id: "ziel100", text: "9. Zielwerte unter 100 mg/dl möglich?" },
    { id: "vorbefuellt", text: "10. Vorbefüllte Reservoire nutzen?" },
    { id: "leicht", text: "11. Sehr geringes Gewicht (< 100g)?" }
];

const userAnswers = {};
questions.forEach(q => {
    userAnswers[q.id] = null;
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `<span class="question-text">${q.text}</span><div class="options">
        <button onclick="setAns('${q.id}',true,this)">Ja</button>
        <button onclick="setAns('${q.id}',false,this)">Nein</button>
        <button class="active" onclick="setAns('${q.id}',null,this)">Egal</button>
    </div>`;
    document.getElementById('quiz').appendChild(div);
});

function setAns(id, val, btn) {
    userAnswers[id] = val;
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function calculateScore() {
    const age = parseInt(document.getElementById('user-age').value);
    const tdd = parseInt(document.getElementById('user-tdd').value);
    const selS = document.getElementById('sensor-choice').value;

    let res = systems.map(s => {
        let m = 0, t = 0, w = [];
        if (!isNaN(age) && age < s.minAge) w.push(`Ab ${s.minAge} J.`);
        if (!isNaN(tdd) && tdd > s.maxTDD) w.push(`Max ${s.maxTDD} IE/Tag`);
        
        for (let k in userAnswers) {
            if (userAnswers[k] !== null) { t++; if (s[k] === userAnswers[k]) m++; }
        }
        let score = t === 0 ? 100 : Math.round((m/t)*100);
        if (w.length > 0) score = Math.max(0, score - 50);
        return { ...s, p: score, w: w };
    }).sort((a,b) => b.p - a.p);

    const out = document.getElementById('results');
    out.innerHTML = '<h2>Ergebnis:</h2>';
    res.forEach(r => {
        out.innerHTML += `<div class="result-item">
            <div><span class="loop-tag">AID</span><div class="system-name">${r.name}</div>
            ${r.w.map(warn => `<span class="warning">⚠️ ${warn}</span>`).join("")}</div>
            <div style="text-align:right"><span style="font-size:24px; font-weight:bold">${r.p}%</span></div>
        </div>`;
    });
    out.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
