<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AID-System Wahlomat 2026</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1 { color: #5dade2; text-align: center; font-size: 22px; margin-bottom: 20px; }
        
        .question-card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #3498db; }
        .options { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        
        button, select { flex: 1; min-width: 80px; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #2c2c2c; color: white; font-weight: bold; cursor: pointer; }
        button.active { background: #3498db; }
        .important-btn.active { background: #f1c40f; color: black; }
        
        #result-btn { width: 100%; padding: 18px; background: #2ecc71; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }

        /* DER FIX: Absolut getrennte Spalten */
        .result-item { 
            background: #1e1e1e; margin-top: 12px; padding: 15px; 
            border-radius: 12px; border: 1px solid #333;
            display: grid;
            grid-template-columns: 1fr 120px; /* Text kriegt alles, Prozent genau 120px */
            align-items: center;
            gap: 10px;
        }

        .result-content { min-width: 0; } /* Verhindert das Rausdrücken */
        
        .system-name { font-size: 18px; font-weight: bold; color: #5dade2; margin: 5px 0; overflow-wrap: break-word; }
        
        .percentage-box { 
            text-align: right; 
            border-left: 1px solid #333; /* Optische Trennung */
            padding-left: 10px;
        }
        
        .percent-big { font-size: 26px; font-weight: bold; color: #2ecc71; display: block; }
        .percent-label { font-size: 10px; color: #2ecc71; text-transform: uppercase; }

        .details { font-size: 13px; color: #aaa; line-height: 1.3; }
        .loop-tag { background: #27ae60; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pumpen-Wahlomat 2026</h1>

    <div id="quiz"></div>

    <div class="question-card" style="border-left-color: #f1c40f;">
        <strong>Frage 10: Welchen Sensor?</strong>
        <div class="options">
            <select id="sensor-choice">
                <option value="egal">Egal</option>
                <option value="G6">Dexcom G6</option>
                <option value="G7">Dexcom G7 (Kein Ypso!)</option>
                <option value="L3">Libre 3</option>
                <option value="L3P">Libre 3 Plus</option>
                <option value="G4">Guardian 4</option>
                <option value="SIM">Simplera Sync</option>
            </select>
            <button id="s-imp" onclick="sensorImportant=!sensorImportant; this.classList.toggle('active'); this.classList.toggle('important-btn');" style="flex:0.4">Wichtig!</button>
        </div>
    </div>

    <button id="result-btn" onclick="calculateScore()">Auswertung anzeigen</button>
    <div id="results"></div>
</div>

<script>
let sensorImportant = false;
const systems = [
    { name: "Omnipod 5", patch: true, loop: true, handy: false, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["G6", "G7"], note: "Patch-System" },
    { name: "Ypsopump (CamAPS FX)", patch: false, loop: true, handy: true, wasser: true, schwanger: true, batterie: true, zielUnter100: true, vorbefuellt: true, leicht: true, sensors: ["G6", "L3", "L3P"], note: "Libre 3/3+ Support (Kein G7!)" },
    { name: "t:slim X2", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G6", "G7"], note: "Control-IQ Technologie" },
    { name: "Medtronic 780G", patch: false, loop: true, handy: false, wasser: true, schwanger: true, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G4", "SIM"], note: "SmartGuard System" }
];

const questions = [
    { id: "loop", text: "AID-System (Loop) erwünscht?" },
    { id: "patch", text: "Patch-Pumpe (schlauchlos)?" },
    { id: "handy", text: "Handy-Steuerung wichtig?" }
];

const userAnswers = {};
questions.forEach(q => {
    userAnswers[q.id] = { value: null, weight: 0 };
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `<div>${q.text}</div><div class="options">
        <button onclick="setAns('${q.id}',true,this,1)">Ja</button>
        <button class="important-btn" onclick="setAns('${q.id}',true,this,3)">Wichtig!</button>
        <button class="active" onclick="setAns('${q.id}',null,this,0)">Egal</button>
    </div>`;
    document.getElementById('quiz').appendChild(div);
});

function setAns(id, val, btn, w) {
    userAnswers[id] = { value: val, weight: w };
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function calculateScore() {
    const selS = document.getElementById('sensor-choice').value;
    let res = systems.map(s => {
        let m = 0, t = 0;
        for (let k in userAnswers) {
            if (userAnswers[k].weight > 0) {
                t += userAnswers[k].weight;
                if (s[k] === userAnswers[k].value) m += userAnswers[k].weight;
            }
        }
        if (selS !== "egal") {
            const w = sensorImportant ? 3 : 1;
            t += w;
            if (s.sensors.includes(selS)) m += w;
        }
        return { ...s, p: t === 0 ? 100 : Math.round((m/t)*100) };
    }).sort((a,b) => b.p - a.p);

    const out = document.getElementById('results');
    out.innerHTML = "";
    res.forEach(r => {
        out.innerHTML += `
        <div class="result-item">
            <div class="result-content">
                <span class="loop-tag">AID / LOOP</span>
                <div class="system-name">${r.name}</div>
                <div class="details">Sensoren: ${r.sensors.join(", ")}<br>Info: ${r.note}</div>
            </div>
            <div class="percentage-box">
                <span class="percent-big">${r.p}%</span>
                <span class="percent-label">Match</span>
            </div>
        </div>`;
    });
}
</script>
</body>
</html>
