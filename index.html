<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AID-System/Pumpen-Wahlomat DE 2026</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1 { color: #5dade2; text-align: center; font-size: 22px; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
        
        .question-card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .question-text { font-weight: bold; font-size: 15px; margin-bottom: 10px; display: block; }
        .options { display: flex; gap: 8px; flex-wrap: wrap; }
        
        button, select, input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; min-width: 80px; }
        button.active { background: #3498db; border-color: #5dade2; }
        
        input { cursor: text; text-align: center; outline: none; }
        input:focus { border-color: #5dade2; background: #333; }
        
        select { background: #333; border-color: #5dade2; appearance: none; text-align: center; }
        #result-btn { width: 100%; padding: 20px; background: #2ecc71; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; margin-top: 25px; cursor: pointer; color: black; }

        .result-item { 
            background: #1e1e1e; margin-top: 15px; padding: 18px; 
            border-radius: 12px; border: 1px solid #333;
            display: grid; grid-template-columns: 1fr 130px; align-items: center; gap: 15px;
        }

        .result-content { min-width: 0; }
        .system-name { font-size: 19px; font-weight: bold; color: #5dade2; margin: 4px 0; }
        
        .percentage-box { text-align: right; border-left: 1px solid #444; padding-left: 15px; display: flex; flex-direction: column; align-items: flex-end; }
        .percent-big { font-size: 28px; font-weight: bold; color: #2ecc71; line-height: 1; }
        .percent-label { font-size: 10px; color: #2ecc71; text-transform: uppercase; margin-top: 4px; }

        .details { font-size: 13px; color: #aaa; margin-top: 8px; line-height: 1.4; }
        .warning { color: #ff4d4d; font-weight: bold; font-size: 12px; margin-top: 5px; display: block; }
        .loop-tag { display: inline-block; padding: 3px 7px; border-radius: 4px; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; background: #27ae60; color: white; }
        .no-loop { background: #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <h1>AID-System Wahlomat</h1>
    <p class="sub-title">Komplette Systemliste inkl. Alter & Insulin-Check</p>

    <div class="question-card" style="border-left-color: #9b59b6;">
        <span class="question-text">Wie alt ist der Anwender?</span>
        <div class="options">
            <input type="number" id="user-age" placeholder="Alter (Jahre)">
        </div>
    </div>

    <div class="question-card" style="border-left-color: #9b59b6;">
        <span class="question-text">Täglicher Insulinbedarf (Gesamt IE)?</span>
        <div class="options">
            <input type="number" id="user-tdd" placeholder="Einheiten (z.B. 40)">
        </div>
    </div>

    <div id="quiz"></div>

    <div class="question-card" style="border-left-color: #f1c40f;">
        <span class="question-text">Bevorzugter CGM-Sensor?</span>
        <div class="options">
            <select id="sensor-choice">
                <option value="egal">Egal / Kein Wunsch</option>
                <option value="G6">Dexcom G6</option>
                <option value="G7">Dexcom G7</option>
                <option value="L3">FreeStyle Libre 3</option>
                <option value="L3P">FreeStyle Libre 3 Plus</option>
                <option value="G4">Guardian 4</option>
                <option value="SIM">Simplera Sync</option>
                <option value="NANO">Medtrum Nano CGM</option>
            </select>
        </div>
    </div>

    <button id="result-btn" onclick="calculateScore()">Auswertung berechnen</button>
    <div id="results"></div>
</div>

<script>
const systems = [
    { name: "Omnipod 5", patch: true, loop: true, handy: false, wasser: true, schwanger: false, batterie: false, sensors: ["G6", "G7"], minAge: 2, minTDD: 5, maxTDD: 65, note: "Schlauchlos. Max. 200IE/3 Tage." },
    { name: "Ypsopump (CamAPS FX)", patch: false, loop: true, handy: true, wasser: true, schwanger: true, batterie: true, sensors: ["G6", "L3", "L3P"], minAge: 0, minTDD: 5, maxTDD: 54, note: "Top für Kleinkinder & Schwangere." },
    { name: "t:slim X2 (Control-IQ)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, sensors: ["G6", "G7"], minAge: 6, minTDD: 10, maxTDD: 100, note: "Großes Reservoir (300IE)." },
    { name: "Medtronic 780G", patch: false, loop: true, handy: false, wasser: true, schwanger: true, batterie: true, sensors: ["G4", "SIM"], minAge: 7, minTDD: 8, maxTDD: 100, note: "Robustes System, eigener Sensor." },
    { name: "Dana-i (DBLG1)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: true, sensors: ["G6"], minAge: 18, minTDD: 8, maxTDD: 90, note: "DBLG1 Algorithmus erst ab 18 J." },
    { name: "Kaleido (DBLG1)", patch: true, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, sensors: ["G6"], minAge: 18, minTDD: 8, maxTDD: 65, note: "Hybrid-Patch. Ab 18 Jahren." },
    { name: "Medtrum Nano (EasyLoop)", patch: true, loop: true, handy: true, wasser: true, schwanger: false, batterie: false, sensors: ["NANO"], minAge: 2, minTDD: 2, maxTDD: 65, note: "Sehr kleiner Nano-Patch." },
    { name: "Dana-i (Basis/AnyDANA)", patch: false, loop: false, handy: true, wasser: false, schwanger: false, batterie: true, sensors: [], minAge: 0, minTDD: 0, maxTDD: 100, note: "Standardpumpe ohne AID." },
    { name: "Omnipod DASH", patch: true, loop: false, handy: false, wasser: true, schwanger: false, batterie: false, sensors: [], minAge: 2, minTDD: 0, maxTDD: 65, note: "Klassischer Patch ohne Loop." },
    { name: "Medtronic 640G/740G", patch: false, loop: false, handy: false, wasser: true, schwanger: true, batterie: true, sensors: ["G4"], minAge: 0, minTDD: 0, maxTDD: 100, note: "Standardpumpe mit Hypo-Abschaltung." }
];

const questions = [
    { id: "loop", text: "Möchtest du einen automatischen Loop (AID)?" },
    { id: "patch", text: "Soll die Pumpe schlauchlos (Patch) sein?" },
    { id: "handy", text: "Bolus-Steuerung über das Smartphone?" },
    { id: "wasser", text: "Wasserdichtigkeit wichtig?" },
    { id: "schwanger", text: "Zulassung für Schwangerschaft benötigt?" },
    { id: "batterie", text: "Betrieb mit AAA-Batterie bevorzugt?" }
];

const userAnswers = {};
const quizContainer = document.getElementById('quiz');

questions.forEach(q => {
    userAnswers[q.id] = null;
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `<span class="question-text">${q.text}</span><div class="options">
        <button onclick="setAns('${q.id}',true,this)">Ja</button>
        <button onclick="setAns('${q.id}',false,this)">Nein</button>
        <button class="active" onclick="setAns('${q.id}',null,this)">Egal</button>
    </div>`;
    quizContainer.appendChild(div);
});

function setAns(id, val, btn) {
    userAnswers[id] = val;
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function calculateScore() {
    const age = parseInt(document.getElementById('user-age').value);
    const tdd = parseInt(document.getElementById('user-tdd').value);
    const selS = document.getElementById('sensor-choice').value;

    let res = systems.map(s => {
        let m = 0, t = 0, w = [];
        
        // Check Alter & Insulin (Harte Kriterien)
        if (!isNaN(age) && age < s.minAge) w.push(`Nicht zugelassen unter ${s.minAge} J.`);
        if (!isNaN(tdd)) {
            if (tdd < s.minTDD && s.loop) w.push(`Verbrauch zu niedrig für Loop-Stabilität`);
            if (tdd > s.maxTDD) w.push(`Bedarf zu hoch (Patch hält keine 3 Tage)`);
        }
        if (selS !== "egal" && s.sensors.length > 0 && !s.sensors.includes(selS)) w.push(`Nicht kompatibel mit ${selS}`);

        // Matching Score
        for (let k in userAnswers) {
            if (userAnswers[k] !== null) { t++; if (s[k] === userAnswers[k]) m++; }
        }
        
        let score = t === 0 ? 100 : Math.round((m/t)*100);
        if (w.length > 0) score = Math.max(0, score - (w.length * 40));

        return { ...s, p: score, w: w };
    }).sort((a,b) => b.p - a.p);

    const out = document.getElementById('results');
    out.innerHTML = '<h2 style="text-align:center; margin-top:20px;">Deine Ergebnisse:</h2>';
    res.forEach(r => {
        out.innerHTML += `
        <div class="result-item" style="${r.w.length > 0 ? 'opacity: 0.6;' : ''}">
            <div class="result-content">
                <span class="loop-tag ${r.loop ? '' : 'no-loop'}">${r.loop ? 'AID' : 'PUMPE'}</span>
                <div class="system-name">${r.name}</div>
                <div class="details">${r.note}</div>
                ${r.w.map(warn => `<span class="warning">⚠️ ${warn}</span>`).join("")}
            </div>
            <div class="percentage-box">
                <span class="percent-big">${r.p}%</span>
                <span class="percent-label">Match</span>
            </div>
        </div>`;
    });
    out.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
