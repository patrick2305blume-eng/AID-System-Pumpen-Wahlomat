<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AID-System Wahlomat 2026</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { max-width: 650px; width: 100%; }
        h1 { color: #5dade2; text-align: center; font-size: 24px; }
        .sub-title { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        
        .question-card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        
        button, select { flex: 1; min-width: 90px; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; cursor: pointer; font-weight: bold; font-size: 13px; }
        button.active { background: #3498db; border-color: #5dade2; }
        .important-btn.active { background: #f1c40f; color: #121212; border-color: #f1c40f; }
        
        select { background: #333; border-color: #5dade2; text-align: center; }
        #result-btn { width: 100%; padding: 20px; background: #2ecc71; font-size: 18px; font-weight: bold; margin-top: 25px; border: none; border-radius: 12px; cursor: pointer; color: #000; }

        /* FIX: Layout-Struktur gegen Überlappung */
        .result-item { 
            background: #1e1e1e; margin-top: 15px; padding: 20px; 
            border-radius: 12px; border: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center;
            gap: 15px;
        }
        .result-content { flex: 1; min-width: 0; }
        .system-name { font-size: 19px; font-weight: bold; color: #5dade2; margin: 0; word-wrap: break-word; }
        
        .percentage-box { text-align: right; min-width: 130px; color: #2ecc71; flex-shrink: 0; }
        .percent-big { font-size: 28px; font-weight: bold; display: block; line-height: 1; }
        .percent-label { font-size: 11px; margin-top: 5px; display: block; }

        .details { font-size: 14px; color: #aaa; margin-top: 10px; line-height: 1.4; }
        .loop-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .is-loop { background: #27ae60; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>AID-System/Pumpen-Wahlomat</h1>
    <p class="sub-title">Version 2026 | Korrigierte Ypsopump-Logik</p>

    <div id="quiz"></div>

    <div class="question-card" style="border-left-color: #f1c40f;">
        <div class="question-text"><strong>Frage 10: Welchen Sensor möchtest du nutzen?</strong></div>
        <div class="options">
            <select id="sensor-choice">
                <option value="egal">Egal / Kein Wunsch</option>
                <option value="G6">Dexcom G6</option>
                <option value="G7">Dexcom G7 (Wichtig: Nicht für Ypso!)</option>
                <option value="L3">FreeStyle Libre 3</option>
                <option value="L3P">FreeStyle Libre 3 Plus</option>
                <option value="G4">Guardian 4 (Medtronic)</option>
                <option value="SIM">Simplera Sync (Medtronic)</option>
                <option value="NANO">Medtrum Nano CGM</option>
            </select>
            <button id="sensor-imp" onclick="toggleSensorImp()" style="flex:0.3; min-width:100px;">Wichtig!</button>
        </div>
    </div>

    <button id="result-btn" onclick="calculateScore()">Auswertung berechnen</button>
    <div id="results"></div>
</div>

<script>
let sensorImportant = false;
function toggleSensorImp() {
    sensorImportant = !sensorImportant;
    document.getElementById('sensor-imp').classList.toggle('active');
    document.getElementById('sensor-imp').classList.toggle('important-btn');
}

const systems = [
    { name: "Omnipod 5", patch: true, loop: true, handy: false, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["G6", "G7"], note: "Schlauchlos & G7 kompatibel" },
    { name: "Ypsopump (CamAPS FX)", patch: false, loop: true, handy: true, wasser: true, schwanger: true, batterie: true, zielUnter100: true, vorbefuellt: true, leicht: true, sensors: ["G6", "L3", "L3P"], note: "Smartphone-Loop (Kein G7!)" },
    { name: "t:slim X2 (Control-IQ)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G6", "G7"], note: "Feste Pumpe mit G7 Support" },
    { name: "Medtronic 780G", patch: false, loop: true, handy: false, wasser: true, schwanger: true, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G4", "SIM"], note: "Eigener Algorithmus & Sensor" },
    { name: "Dana-i (DBLG1)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["G6"], note: "Kompakt mit AAA-Batterie" }
];

const questions = [
    { id: "loop", text: "Möchtest du ein AID-System (Automatischer Loop)?" },
    { id: "patch", text: "Bevorzugst du eine Patch-Pumpe (schlauchlos)?" },
    { id: "handy", text: "Vollständige Smartphone-Steuerung?" },
    { id: "wasser", text: "Wasserdichtigkeit wichtig?" },
    { id: "schwanger", text: "Zulassung für Schwangerschaft?" },
    { id: "batterie", text: "Batterie-Betrieb (AAA) bevorzugt?" },
    { id: "zielUnter100", text: "Zielwerte unter 100 mg/dl möglich?" },
    { id: "vorbefuellt", text: "Vorbefüllte Reservoire?" },
    { id: "leicht", text: "Sehr geringes Gewicht?" }
];

const userAnswers = {};
const quizContainer = document.getElementById('quiz');

questions.forEach(q => {
    userAnswers[q.id] = { value: null, weight: 0 };
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `<div class="question-text">${q.text}</div><div class="options">
        <button onclick="setAnswer('${q.id}', true, this, 1)">Ja</button>
        <button class="important-btn" onclick="setAnswer('${q.id}', true, this, 3)">Wichtig!</button>
        <button onclick="setAnswer('${q.id}', false, this, 1)">Nein</button>
        <button class="active" onclick="setAnswer('${q.id}', null, this, 0)">Egal</button>
    </div>`;
    quizContainer.appendChild(div);
});

function setAnswer(id, val, btn, weight) {
    userAnswers[id] = { value: val, weight: weight };
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function calculateScore() {
    const selSensor = document.getElementById('sensor-choice').value;
    let results = systems.map(sys => {
        let matched = 0, total = 0;
        for (let key in userAnswers) {
            const a = userAnswers[key];
            if (a.weight > 0) { total += a.weight; if (sys[key] === a.value) matched += a.weight; }
        }
        if (selSensor !== "egal") {
            const w = sensorImportant ? 3 : 1;
            total += w;
            if (sys.sensors.includes(selSensor)) matched += w;
        }
        return { ...sys, percent: total === 0 ? 100 : Math.round((matched / total) * 100) };
    });

    results.sort((a, b) => b.percent - a.percent);
    const resDiv = document.getElementById('results');
    resDiv.innerHTML = '<h2 style="margin-top:20px; border-top:1px solid #444; padding-top:15px;">Dein Ranking:</h2>';
    results.forEach(r => {
        resDiv.innerHTML += `
        <div class="result-item">
            <div class="result-content">
                <span class="loop-tag is-loop">AID / Loop</span>
                <p class="system-name">${r.name}</p>
                <div class="details"><strong>Sensoren:</strong> ${r.sensors.join(", ")}<br><strong>Info:</strong> ${r.note}</div>
            </div>
            <div class="percentage-box">
                <span class="percent-big">${r.percent}%</span>
                <span class="percent-label">Übereinstimmung</span>
            </div>
        </div>`;
    });
    resDiv.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
