<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AID-System/Pumpen-Wahlomat DE 2026</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: white; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1 { color: #5dade2; text-align: center; font-size: 22px; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
        
        .question-card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .question-text { font-weight: bold; font-size: 15px; margin-bottom: 10px; display: block; }
        .options { display: flex; gap: 8px; flex-wrap: wrap; }
        
        button, select, input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button.active { background: #3498db; border-color: #5dade2; }
        
        /* Input Styling passend zu den Buttons */
        input { cursor: text; text-align: center; border-color: #444; outline: none; }
        input:focus { border-color: #5dade2; background: #333; }
        
        select { background: #333; border-color: #5dade2; appearance: none; text-align: center; }
        #result-btn { width: 100%; padding: 20px; background: #2ecc71; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; margin-top: 25px; cursor: pointer; color: black; }

        .result-item { 
            background: #1e1e1e; margin-top: 15px; padding: 18px; 
            border-radius: 12px; border: 1px solid #333;
            display: grid; grid-template-columns: 1fr 130px; align-items: center; gap: 15px;
        }

        .result-content { min-width: 0; }
        .system-name { font-size: 19px; font-weight: bold; color: #5dade2; margin: 4px 0; word-wrap: break-word; }
        
        .percentage-box { 
            text-align: right; border-left: 1px solid #444; padding-left: 15px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        
        .percent-big { font-size: 28px; font-weight: bold; color: #2ecc71; line-height: 1; }
        .percent-label { font-size: 10px; color: #2ecc71; text-transform: uppercase; margin-top: 4px; }

        .details { font-size: 13px; color: #aaa; margin-top: 8px; line-height: 1.4; }
        .warning { color: #ff4d4d; font-weight: bold; font-size: 12px; margin-top: 5px; display: block; }
        .loop-tag { display: inline-block; padding: 3px 7px; border-radius: 4px; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; background: #27ae60; color: white; }
        .no-loop { background: #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <h1>AID-System Wahlomat</h1>
    <p class="sub-title">Präzise Analyse DE 2026</p>

    <div class="question-card" style="border-left-color: #9b59b6;">
        <span class="question-text">Wie alt bist du? (Zulassungs-Check)</span>
        <div class="options">
            <input type="number" id="user-age" placeholder="Alter in Jahren eingeben...">
        </div>
    </div>

    <div class="question-card" style="border-left-color: #9b59b6;">
        <span class="question-text">Täglicher Insulinbedarf (Ø Gesamt-Einheiten)?</span>
        <div class="options">
            <input type="number" id="user-tdd" placeholder="Einheiten (IE) eingeben...">
        </div>
    </div>

    <div id="quiz"></div>

    <div class="question-card" style="border-left-color: #f1c40f;">
        <span class="question-text">Welchen Sensor möchtest du nutzen?</span>
        <div class="options">
            <select id="sensor-choice">
                <option value="egal">Egal / Kein Wunsch</option>
                <option value="G6">Dexcom G6</option>
                <option value="G7">Dexcom G7</option>
                <option value="L3">FreeStyle Libre 3</option>
                <option value="L3P">FreeStyle Libre 3 Plus</option>
                <option value="G4">Guardian 4 (Medtronic)</option>
                <option value="SIM">Simplera Sync (Medtronic)</option>
                <option value="NANO">Medtrum Nano CGM</option>
            </select>
        </div>
    </div>

    <button id="result-btn" onclick="calculateScore()">Auswertung berechnen</button>
    <div id="results"></div>
</div>

<script>

    { name: "Ypsopump (CamAPS FX)", patch: false, loop: true, handy: true, wasser: true, schwanger: true, batterie: true, zielUnter100: true, vorbefuellt: true, leicht: true, sensors: ["G6", "L3", "L3P"], minAge: 0, minTDD: 5, maxTDD: 50, note: "Handy-Loop (Libre 3 Support)" },
    { name: "t:slim X2 (Control-IQ)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G6", "G7"], minAge: 6, minTDD: 10, maxTDD: 100, note: "Touchscreen & G7 Support" },
    { name: "Medtronic 780G", patch: false, loop: true, handy: false, wasser: true, schwanger: true, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: false, sensors: ["G4", "SIM"], minAge: 7, minTDD: 8, maxTDD: 100, note: "Integrierter Simplera Sync" },
    { name: "Dana-i (DBLG1)", patch: false, loop: true, handy: false, wasser: false, schwanger: false, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: ["G6"], minAge: 18, minTDD: 8, maxTDD: 100, note: "DBLG1 erst ab 18 Jahren" },

    { name: "Dana-i (Basis)", patch: false, loop: false, handy: true, wasser: false, schwanger: false, batterie: true, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: [], minAge: 0, minTDD: 0, maxTDD: 100, note: "Keine Loop-Einschränkung" },
    { name: "Omnipod DASH", patch: true, loop: false, handy: false, wasser: true, schwanger: false, batterie: false, zielUnter100: false, vorbefuellt: false, leicht: true, sensors: [], minAge: 2, minTDD: 0, maxTDD: 65, note: "Keine Loop-Einschränkung" }
];

const questions = [
    { id: "loop", text: "Möchtest du ein AID-System (Automatischer Loop)?" },
    { id: "patch", text: "Bevorzugst du eine Patch-Pumpe (schlauchlos)?" },
    { id: "handy", text: "Bolus-Steuerung über das Smartphone?" },
    { id: "wasser", text: "Wasserdichtigkeit der Pumpe wichtig?" },
    { id: "schwanger", text: "Zulassung für Schwangerschaft benötigt?" },
    { id: "batterie", text: "Betrieb mit AAA-Batterie bevorzugt?" },
    { id: "zielUnter100", text: "Zielwerte unter 100 mg/dl möglich?" },
    { id: "vorbefuellt", text: "Vorbefüllte Reservoire nutzen?" },
    { id: "leicht", text: "Sehr geringes Gewicht (< 100g)?" }
];

const userAnswers = {};
const quizContainer = document.getElementById('quiz');

questions.forEach(q => {
    userAnswers[q.id] = null;
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `<span class="question-text">${q.text}</span><div class="options">
        <button onclick="setAns('${q.id}',true,this)">Ja</button>
        <button onclick="setAns('${q.id}',false,this)">Nein</button>
        <button class="active" onclick="setAns('${q.id}',null,this)">Egal</button>
    </div>`;
    quizContainer.appendChild(div);
});

function setAns(id, val, btn) {
    userAnswers[id] = val;
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function calculateScore() {
    const selS = document.getElementById('sensor-choice').value;
    const age = parseInt(document.getElementById('user-age').value);
    const tdd = parseInt(document.getElementById('user-tdd').value);

    let res = systems.map(s => {
        let m = 0, t = 0;
        let warnings = [];

        // Check Alter & Insulin
        if (!isNaN(age) && age < s.minAge) warnings.push(`Erst ab ${s.minAge} J. zugelassen`);
        if (!isNaN(tdd)) {
            if (tdd < s.minTDD && s.loop) warnings.push(`Verbrauch zu niedrig für Loop`);
            if (tdd > s.maxTDD) warnings.push(`Verbrauch zu hoch für Reservoir`);
        }

        for (let k in userAnswers) {
            if (userAnswers[k] !== null) {
                t++;
                if (s[k] === userAnswers[k]) m++;
            }
        }
        if (selS !== "egal") {
            t++;
            if (s.sensors.includes(selS)) m++;
        }
        
        let score = t === 0 ? 100 : Math.round((m/t)*100);
        // Harter Abzug bei unpassenden Grundvoraussetzungen
        if (warnings.length > 0) score = Math.max(0, score - 50);
